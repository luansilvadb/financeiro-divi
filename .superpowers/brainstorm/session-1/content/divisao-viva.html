<h2>Divisão Viva ⚡</h2>
<p class="subtitle">O valor atualiza na hora. Impossível esquecer de dividir.</p>

<div class="mockup">
  <div class="mockup-body" style="padding: 24px;">
    <p style="font-size: 18px; font-weight: 800; margin-bottom: 25px; text-align: center;">"Quem vai pagar esse gasto?"</p>
    
    <div class="avatar-grid">
      <!-- Luan -->
      <div class="avatar-item active" onclick="toggleMember(this, 100)">
        <div class="avatar-wrapper">
          <div class="img-placeholder" style="background: linear-gradient(135deg, #017BF7, #00d2ff);">L</div>
          <div class="badge">✔</div>
        </div>
        <span class="avatar-name">Luan</span>
      </div>

      <!-- Maria -->
      <div class="avatar-item" onclick="toggleMember(this, 100)">
        <div class="avatar-wrapper">
          <div class="img-placeholder">M</div>
          <div class="badge">✔</div>
        </div>
        <span class="avatar-name">Maria</span>
      </div>

      <!-- João -->
      <div class="avatar-item" onclick="toggleMember(this, 100)">
        <div class="avatar-wrapper">
          <div class="img-placeholder">J</div>
          <div class="badge">✔</div>
        </div>
        <span class="avatar-name">João</span>
      </div>
    </div>

    <!-- O "Pulo do Gato": Calculadora em Tempo Real -->
    <div class="division-card">
      <div class="total-info">
        <span class="label">Valor Total</span>
        <span class="value">R$ 100,00</span>
      </div>
      <div class="arrow">➔</div>
      <div class="split-info">
        <span class="label">Para cada um</span>
        <span class="value" id="per-person">R$ 100,00</span>
      </div>
    </div>

    <p id="hint" style="font-size: 12px; color: #f59e0b; margin-top: 15px; font-weight: 600; text-align: center;">
      ⚠️ Só você? Toque nos amigos para dividir!
    </p>

    <button class="btn-next" style="margin-top: 20px;">Tudo certo! ➔</button>
  </div>
</div>

<script>
  function toggleMember(el, total) {
    el.classList.toggle('active');
    const activeCount = document.querySelectorAll('.avatar-item.active').length;
    const perPerson = total / activeCount;
    
    document.getElementById('per-person').innerText = 'R$ ' + perPerson.toFixed(2).replace('.', ',');
    
    const hint = document.getElementById('hint');
    if (activeCount > 1) {
      hint.style.opacity = '0';
      document.querySelector('.division-card').style.background = '#f0fdf4';
      document.querySelector('.division-card').style.borderColor = '#bbf7d0';
    } else {
      hint.style.opacity = '1';
      document.querySelector('.division-card').style.background = '#fffbeb';
      document.querySelector('.division-card').style.borderColor = '#fef3c7';
    }
  }
</script>

<style>
  .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
  .avatar-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s; }
  .avatar-wrapper { position: relative; width: 65px; height: 65px; }
  .img-placeholder { 
    width: 100%; height: 100%; border-radius: 50%; background: #f3f4f6; 
    display: flex; align-items: center; justify-content: center; font-weight: bold; color: #9ca3af;
    border: 3px solid transparent; transition: all 0.2s;
  }
  .avatar-item.active .img-placeholder { border-color: #017BF7; background: #017BF7; color: white; }
  .badge { 
    position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; 
    background: #017BF7; border: 2px solid white; border-radius: 50%; 
    display: none; align-items: center; justify-content: center; color: white; font-size: 10px;
  }
  .avatar-item.active .badge { display: flex; }
  
  .division-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px; background: #fffbeb; border: 2px solid #fef3c7; border-radius: 20px;
    transition: all 0.3s ease;
  }
  .total-info, .split-info { display: flex; flex-direction: column; }
  .label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .value { font-size: 18px; font-weight: 900; color: #111827; }
  .arrow { font-size: 20px; color: #d1d5db; }
  
  .btn-next {
    width: 100%; background: #111827; color: white; border: none; padding: 18px;
    border-radius: 20px; font-weight: 800; cursor: pointer;
  }
</style>

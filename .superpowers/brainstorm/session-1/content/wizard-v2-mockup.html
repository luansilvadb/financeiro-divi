<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Wizard V2 - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .progress-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .step-card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden relative border border-gray-100">
        
        <!-- Stepper Superior (Premium) -->
        <div class="absolute top-0 left-0 right-0">
            <div class="h-1 bg-gray-100 w-full">
                <div class="h-full bg-blue-500 progress-fill" style="width: 66%"></div>
            </div>
            <div class="py-3 text-center">
                <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Passo 2 de 3</span>
            </div>
        </div>

        <div class="p-8 pt-12">
            <!-- Conteúdo do Passo 2 (Fusão) -->
            <div class="step-card">
                <h2 class="text-2xl font-extrabold text-gray-900 mb-8 text-center tracking-tight">
                    Quais os dados do lançamento?
                </h2>

                <!-- Bloco de Valor Premium -->
                <div class="mb-8 text-center bg-blue-50/50 p-10 rounded-[2.5rem] border-2 border-blue-100 group transition-all hover:bg-blue-50">
                    <div class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-4">Valor Total</div>
                    <div class="flex items-baseline justify-center gap-2">
                        <span class="text-blue-300 text-2xl font-bold">R$</span>
                        <span class="text-6xl font-black text-blue-600 mono tracking-tighter">150,00</span>
                    </div>
                </div>

                <!-- Input de Descrição Integrado -->
                <div class="relative group">
                    <input 
                        type="text" 
                        value="Jantar com amigos"
                        class="w-full p-6 text-xl border-2 border-gray-100 rounded-3xl focus:border-blue-500 focus:outline-none bg-gray-50 transition-all font-semibold text-gray-700 placeholder:text-gray-300 shadow-sm group-hover:border-gray-200"
                        placeholder="O que você comprou?"
                    />
                </div>
            </div>
        </div>

        <!-- Rodapé Sticky Premium -->
        <div class="p-6 bg-white/80 backdrop-blur-xl border-t border-gray-50 flex gap-4 mt-8">
            <button class="flex-1 px-8 py-5 bg-gray-100 text-gray-500 font-bold rounded-3xl hover:bg-gray-200 transition-colors">
                Voltar
            </button>
            <button class="flex-[2] px-8 py-5 bg-blue-600 text-white font-bold rounded-3xl shadow-lg shadow-blue-200 hover:scale-[1.02] active:scale-95 transition-all">
                Próximo
            </button>
        </div>
    </div>

</body>
</html>

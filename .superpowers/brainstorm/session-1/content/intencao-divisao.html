<h2>Intenção de Divisão 🎯</h2>
<p class="subtitle">Primeiro decidimos se vamos dividir. Depois escolhemos com quem.</p>

<div class="mockup">
  <div class="mockup-body" style="padding: 30px; text-align: center;">
    <p style="font-size: 22px; font-weight: 900; margin-bottom: 40px; color: #111827; line-height: 1.2;">
      "Esse gasto é <span style="color: #017BF7;">só seu</span> ou quer <span style="color: #10b981;">dividir</span>?"
    </p>
    
    <div class="intent-options">
      <!-- Opção: Só Eu -->
      <button class="intent-card" onclick="showSelection(false)">
        <div class="icon-circle" style="background: #eff6ff;">🙋‍♂️</div>
        <div class="text">
          <span class="title">É só meu</span>
          <span class="desc">Vou pagar tudo sozinho</span>
        </div>
      </button>

      <!-- Opção: Dividir -->
      <button class="intent-card highlight" onclick="showSelection(true)">
        <div class="icon-circle" style="background: #ecfdf5;">👥</div>
        <div class="text">
          <span class="title">Vamos dividir!</span>
          <span class="desc">Repartir com os amigos</span>
        </div>
      </button>
    </div>

    <!-- Lista que aparece só se clicar em Dividir -->
    <div id="selection-area" style="display: none; margin-top: 40px; border-top: 2px dashed #eee; padding-top: 30px;">
       <p style="font-size: 14px; font-weight: 700; margin-bottom: 20px;">Com quem você quer dividir?</p>
       <div class="mini-avatar-grid">
         <div class="mini-avatar active">M</div>
         <div class="mini-avatar">J</div>
         <div class="mini-avatar">P</div>
       </div>
       <button class="btn-confirm" style="margin-top: 25px;">Confirmar Divisão</button>
    </div>
  </div>
</div>

<script>
  function showSelection(show) {
    const area = document.getElementById('selection-area');
    area.style.display = show ? 'block' : 'none';
    if(show) area.scrollIntoView({ behavior: 'smooth' });
    else alert('Pronto! Gasto registrado só para você.');
  }
</script>

<style>
  .intent-options { display: flex; flex-direction: column; gap: 20px; }
  .intent-card { 
    display: flex; align-items: center; gap: 20px; padding: 25px; 
    border-radius: 24px; border: 2px solid #f3f4f6; background: white;
    cursor: pointer; transition: all 0.2s; text-align: left; width: 100%;
  }
  .intent-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
  .intent-card.highlight { border-color: #10b981; background: #f0fdf4; }
  
  .icon-circle { 
    width: 60px; height: 60px; border-radius: 50%; font-size: 30px; 
    display: flex; align-items: center; justify-content: center; 
  }
  
  .text { display: flex; flex-direction: column; }
  .title { font-size: 18px; font-weight: 800; color: #111827; }
  .desc { font-size: 13px; color: #6b7280; }
  
  .mini-avatar-grid { display: flex; justify-content: center; gap: 15px; }
  .mini-avatar { 
    width: 50px; height: 50px; border-radius: 50%; background: #f3f4f6;
    display: flex; align-items: center; justify-content: center; font-weight: 800;
  }
  .mini-avatar.active { background: #10b981; color: white; border: 3px solid #d1fae5; }
  
  .btn-confirm {
    width: 100%; background: #10b981; color: white; border: none; padding: 18px;
    border-radius: 20px; font-weight: 800; cursor: pointer;
  }
</style>

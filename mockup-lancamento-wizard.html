<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup: Consistência de UX - Wizard de Lançamentos</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --canvas: #faf9f6;
      --white: #ffffff;
      --charcoal: #1e1b18;
      --ember: #ef4444;
      --ash: #8c827a;
      --stone: #e7e5e4;
      --stone-light: #f5f4f0;
      --meadow: #10b981;
      --coral: #f43f5e;
      
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0c0a09;
      font-family: var(--font-sans);
      color: var(--charcoal);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-emulator {
      width: 390px;
      height: 800px;
      background-color: var(--canvas);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 12px #292524;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      border: 4px solid #44403c;
    }

    .notch {
      width: 150px;
      height: 25px;
      background-color: #292524;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
      z-index: 1000;
    }

    /* Barra Superior com as Etapas do Lançamento */
    .wizard-header {
      padding: 40px 24px 16px 24px;
      border-bottom: 1px solid var(--stone);
      background-color: var(--white);
      flex-shrink: 0;
      transition: all 0.4s var(--ease-smooth);
    }

    /* Modo Foco: esconde o progresso do lançamento principal */
    .wizard-header.hidden-focus {
      opacity: 0;
      transform: translateY(-20px);
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-bottom-color: transparent;
      pointer-events: none;
      overflow: hidden;
    }

    .wizard-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .wizard-title-row h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
    }

    .wizard-title-row h2 span {
      color: var(--ember);
    }

    .btn-close-wizard {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--stone-light);
      border: 1px solid var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Indicador de Etapas */
    .progress-bar-container {
      display: flex;
      gap: 6px;
    }

    .progress-step {
      flex: 1;
      height: 6px;
      border-radius: 10px;
      background-color: var(--stone);
      transition: all 0.3s;
    }

    .progress-step.active {
      background-color: var(--ember);
    }

    .progress-step.completed {
      background-color: var(--charcoal);
    }

    /* Área de Conteúdo */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .wizard-view {
      display: none;
      flex-direction: column;
      height: 100%;
      animation: slideIn 0.35s var(--ease-smooth) forwards;
    }

    .wizard-view.active {
      display: flex;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Sub-Fluxo (Criação de Cartão Inline - Foco Total) */
    .sub-flow-container {
      display: none;
      flex-direction: column;
      height: 100%;
      animation: fadeInFocus 0.4s var(--ease-smooth) forwards;
    }

    .sub-flow-container.active {
      display: flex;
    }

    @keyframes fadeInFocus {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Elementos de Formulário */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ash);
      margin-left: 4px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--stone);
      background-color: var(--white);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 700;
      color: var(--charcoal);
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: var(--ember);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.08);
    }

    /* Seletor de Comprador */
    .buyer-grid {
      display: flex;
      gap: 10px;
    }

    .buyer-option {
      flex: 1;
      padding: 14px;
      border: 1px solid var(--stone);
      background-color: var(--white);
      border-radius: 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .buyer-option.active {
      border-color: var(--ember);
      background-color: rgba(239, 68, 68, 0.04);
      color: var(--ember);
    }

    /* Seletores de Método */
    .method-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .method-option {
      flex: 1;
      padding: 20px 16px;
      border: 1px solid var(--stone);
      background-color: var(--white);
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s var(--ease-smooth);
    }

    .method-option.active {
      border-color: var(--ember);
      background-color: rgba(239, 68, 68, 0.04);
      color: var(--ember);
    }

    .method-option i {
      color: var(--ash);
      transition: color 0.2s;
    }

    .method-option.active i {
      color: var(--ember);
    }

    /* Lista de Cartões no Passo 2 */
    .card-selector-box {
      border: 1px solid var(--stone);
      border-radius: 24px;
      background-color: var(--white);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid transparent;
      cursor: pointer;
      background-color: var(--stone-light);
      transition: all 0.2s;
    }

    .card-row-item.active {
      border-color: var(--ember);
      background-color: var(--white);
    }

    .card-row-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--white);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card-name {
      font-size: 13px;
      font-weight: 700;
    }

    .radio-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .card-row-item.active .radio-circle {
      border-color: var(--ember);
    }

    .card-row-item.active .radio-circle::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--ember);
    }

    /* Botão de cadastrar cartão inline no Wizard */
    .btn-create-card-inline {
      width: 100%;
      border: 2px dashed var(--stone);
      background-color: transparent;
      color: var(--ash);
      padding: 14px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-create-card-inline:hover {
      border-color: var(--ember);
      color: var(--ember);
      background-color: rgba(239, 68, 68, 0.02);
    }

    /* Paleta de cores do sub-fluxo */
    .color-picker-grid {
      display: flex;
      gap: 10px;
    }

    .color-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }

    .color-dot.selected {
      border-color: var(--charcoal);
      transform: scale(1.1);
    }

    /* Passo 3: Rateio/Divisão */
    .member-division-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .member-division-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background-color: var(--white);
      border: 1px solid var(--stone);
      border-radius: 20px;
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .member-name {
      font-size: 14px;
      font-weight: 700;
    }

    .member-value {
      font-size: 15px;
      font-weight: 800;
      color: var(--ember);
    }

    /* Rodapé do Wizard */
    .wizard-footer {
      padding: 20px 24px 28px 24px;
      border-top: 1px solid var(--stone);
      background-color: var(--white);
      flex-shrink: 0;
      display: flex;
      gap: 12px;
      transition: all 0.4s var(--ease-smooth);
    }

    /* Ocultar rodapé principal no Modo Foco */
    .wizard-footer.hidden-focus {
      opacity: 0;
      transform: translateY(20px);
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-top-color: transparent;
      pointer-events: none;
      overflow: hidden;
    }

    .btn-action {
      flex: 1;
      padding: 16px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-action-primary {
      background-color: var(--charcoal);
      color: var(--white);
    }

    .btn-action-primary:hover {
      opacity: 0.9;
    }

    .btn-action-secondary {
      background-color: var(--stone-light);
      border: 1px solid var(--stone);
      color: var(--charcoal);
    }

    .btn-action-secondary:hover {
      background-color: var(--stone);
    }

    /* Sub-Header do Sub-Fluxo */
    .sub-flow-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .btn-back {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--stone-light);
      border: 1px solid var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .sub-flow-title h3 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
    }

    .sub-flow-title h3 span {
      color: var(--ember);
    }

    .sub-flow-title p {
      font-size: 10px;
      font-weight: 700;
      color: var(--ash);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .ios-bar {
      width: 140px;
      height: 5px;
      background-color: #292524;
      border-radius: 10px;
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* Painel de status dos dados preservados */
    .data-inspector-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 300px;
      background-color: #1e1b18;
      border: 1px solid #44403c;
      border-radius: 20px;
      padding: 16px;
      color: #a8a29e;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .data-inspector-panel h4 {
      color: var(--white);
      font-size: 13px;
      margin-bottom: 10px;
      font-family: var(--font-display);
      border-bottom: 1px solid #44403c;
      padding-bottom: 6px;
    }

    .inspector-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-bottom: 8px;
    }

    .inspector-row span:last-child {
      color: var(--white);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Inspetor de Dados (Para ver os dados preservados em tempo real) -->
  <div class="data-inspector-panel">
    <h4>Inspector de Estado (Vue.js)</h4>
    <div class="inspector-row">
      <span>Passo Ativo:</span>
      <span id="inspectPasso">Passo 1</span>
    </div>
    <div class="inspector-row">
      <span>Descrição (gasto):</span>
      <span id="inspectDesc">-</span>
    </div>
    <div class="inspector-row">
      <span>Valor (gasto):</span>
      <span id="inspectValor">-</span>
    </div>
    <div class="inspector-row">
      <span>Comprador:</span>
      <span id="inspectComprador">Luan</span>
    </div>
    <div class="inspector-row">
      <span>Cartão Selecionado:</span>
      <span id="inspectCartao">Nenhum</span>
    </div>
    <div class="inspector-row" style="margin-top: 10px; border-top: 1px solid #44403c; padding-top: 8px;">
      <span>Sub-fluxo Aberto?</span>
      <span id="inspectSubflow" style="color: #facc15;">Não</span>
    </div>
  </div>

  <!-- Celular Emulador -->
  <div class="phone-emulator">
    <div class="notch"></div>
    
    <!-- Cabeçalho do Wizard (Ocultado no Modo Foco do Sub-fluxo) -->
    <div class="wizard-header" id="wizardHeader">
      <div class="wizard-title-row">
        <h2>Novo <span>Lançamento</span></h2>
        <button class="btn-close-wizard"><i data-lucide="x" style="width: 16px;"></i></button>
      </div>
      <div class="progress-bar-container">
        <div class="progress-step active" id="barStep1"></div>
        <div class="progress-step" id="barStep2"></div>
        <div class="progress-step" id="barStep3"></div>
      </div>
    </div>

    <!-- Área de Conteúdo -->
    <div class="content-area">
      
      <!-- PASSO 1: DADOS BÁSICOS -->
      <div class="wizard-view active" id="viewStep1">
        <div class="form-group">
          <label class="form-label">Descrição da Compra</label>
          <input type="text" id="inputDesc" class="form-input" placeholder="Ex: Mercado, Luz, Aluguel..." oninput="updateInspector()">
        </div>
        
        <div class="form-group">
          <label class="form-label">Valor do Gasto</label>
          <input type="text" id="inputValor" class="form-input" placeholder="R$ 0,00" oninput="updateInspector()">
        </div>

        <div class="form-group">
          <label class="form-label">Quem comprou?</label>
          <div class="buyer-grid">
            <button class="buyer-option active" onclick="setBuyer('Luan', this)">Luan</button>
            <button class="buyer-option" onclick="setBuyer('Maria', this)">Maria</button>
            <button class="buyer-option" onclick="setBuyer('João', this)">João</button>
          </div>
        </div>
      </div>

      <!-- PASSO 2: MÉTODO DE PAGAMENTO -->
      <div class="wizard-view" id="viewStep2">
        <label class="form-label" style="margin-bottom: 8px; display: block;">Forma de Pagamento</label>
        <div class="method-row">
          <button class="method-option active" id="methodPix" onclick="setMethod('pix')">
            <i data-lucide="wallet" style="width: 24px; height: 24px;"></i>
            <span>Pix / Dinheiro</span>
          </button>
          <button class="method-option" id="methodCard" onclick="setMethod('card')">
            <i data-lucide="credit-card" style="width: 24px; height: 24px;"></i>
            <span>Cartão de Crédito</span>
          </button>
        </div>

        <!-- Seletor de Cartões (Ocultado se Pix estiver ativo) -->
        <div class="form-group" id="cardSelectorContainer" style="display: none;">
          <label class="form-label">Selecione o Cartão</label>
          
          <div class="card-selector-box">
            <div class="cards-list" id="cardsListContainer">
              <!-- Injetado dinamicamente -->
            </div>
            
            <!-- Botão de sub-fluxo: Cadastrar cartão sem sair do wizard -->
            <button class="btn-create-card-inline" onclick="openSubflowCard()">
              <i data-lucide="plus" style="width: 16px;"></i>
              Cadastrar Novo Cartão
            </button>
          </div>
        </div>
      </div>

      <!-- PASSO 3: DIVISÃO DE GASTOS -->
      <div class="wizard-view" id="viewStep3">
        <label class="form-label" style="margin-bottom: 16px; display: block;">Divisão do Gasto (Rateio Igual)</label>
        
        <div class="member-division-list">
          <div class="member-division-row">
            <div class="member-info">
              <i data-lucide="user" style="color: var(--ash);"></i>
              <span class="member-name">Luan</span>
            </div>
            <span class="member-value" id="divValueLuan">R$ 0,00</span>
          </div>
          <div class="member-division-row">
            <div class="member-info">
              <i data-lucide="user" style="color: var(--ash);"></i>
              <span class="member-name">Maria</span>
            </div>
            <span class="member-value" id="divValueMaria">R$ 0,00</span>
          </div>
          <div class="member-division-row">
            <div class="member-info">
              <i data-lucide="user" style="color: var(--ash);"></i>
              <span class="member-name">João</span>
            </div>
            <span class="member-value" id="divValueJoao">R$ 0,00</span>
          </div>
        </div>
      </div>

      <!-- SUB-FLUXO: NOVO CARTÃO INLINE (MODO FOCO ATIVO!) -->
      <div class="sub-flow-container" id="subflowCard">
        <div class="sub-flow-header">
          <button class="btn-back" onclick="closeSubflowCard()"><i data-lucide="arrow-left" style="width: 20px;"></i></button>
          <div class="sub-flow-title">
            <h3>Novo <span>Cartão</span></h3>
            <p>Cadastre sem perder o progresso</p>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Nome do Cartão</label>
          <input type="text" id="subflowCardName" class="form-input" placeholder="Ex: Nubank, C6, Inter...">
        </div>

        <div class="form-group">
          <label class="form-label">Cor do Cartão</label>
          <div class="color-picker-grid">
            <div class="color-dot selected" style="background-color: #a855f7;" data-color="#a855f7" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background-color: #f97316;" data-color="#f97316" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background-color: #3b82f6;" data-color="#3b82f6" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background-color: #10b981;" data-color="#10b981" onclick="selectColor(this)"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Dia de Fechamento</label>
          <input type="number" id="subflowCardDay" class="form-input" value="10" min="1" max="31">
        </div>

        <div class="form-actions" style="margin-top: auto;">
          <button class="btn-secondary" style="flex: 1;" onclick="closeSubflowCard()">Cancelar</button>
          <button class="btn-primary" style="flex: 1;" onclick="saveCardSubflow()">Salvar Cartão</button>
        </div>
      </div>

    </div>

    <!-- Rodapé do Wizard (Ocultado no Modo Foco do Sub-fluxo) -->
    <div class="wizard-footer" id="wizardFooter">
      <button class="btn-action btn-action-secondary" id="btnPrev" onclick="navigateStep(-1)" style="display: none;">Voltar</button>
      <button class="btn-action btn-action-primary" id="btnNext" onclick="navigateStep(1)">Avançar</button>
    </div>

    <div class="ios-bar"></div>
  </div>

  <script>
    // Estado do Wizard
    let passo = 1;
    let comprador = 'Luan';
    let metodo = 'pix';
    let cartaoSelecionadoId = '1';
    let subflowAberto = false;
    let selectedColor = '#a855f7';

    // Banco de Dados simulado
    let cartoes = [
      { id: '1', nome: 'Nubank', cor: '#a855f7', diaFechamento: 10 }
    ];

    function init() {
      renderCartoesList();
      lucide.createIcons();
      updateInspector();
    }

    // Navega pelos passos do Wizard
    function navigateStep(direction) {
      passo += direction;
      
      // Limites
      if (passo < 1) passo = 1;
      if (passo > 3) {
        alert("Lançamento concluído com sucesso!");
        resetWizard();
        return;
      }

      // Atualiza Views
      document.querySelectorAll('.wizard-view').forEach(v => v.classList.remove('active'));
      document.getElementById(`viewStep${passo}`).classList.add('active');

      // Atualiza Barras de progresso
      for (let i = 1; i <= 3; i++) {
        const bar = document.getElementById(`barStep${i}`);
        bar.classList.toggle('active', i === passo);
        bar.classList.toggle('completed', i < passo);
      }

      // Botões do Rodapé
      document.getElementById('btnPrev').style.display = passo > 1 ? 'block' : 'none';
      document.getElementById('btnNext').innerText = passo === 3 ? 'Finalizar Lançamento' : 'Avançar';

      if (passo === 3) {
        calculateDivision();
      }

      updateInspector();
    }

    // Define o comprador
    function setBuyer(name, btn) {
      comprador = name;
      document.querySelectorAll('.buyer-option').forEach(o => o.classList.remove('active'));
      btn.classList.add('active');
      updateInspector();
    }

    // Define o método de pagamento
    function setMethod(m) {
      metodo = m;
      document.getElementById('methodPix').classList.toggle('active', m === 'pix');
      document.getElementById('methodCard').classList.toggle('active', m === 'card');
      
      document.getElementById('cardSelectorContainer').style.display = m === 'card' ? 'block' : 'none';
      updateInspector();
    }

    // Renderiza os cartões disponíveis
    function renderCartoesList() {
      const container = document.getElementById('cardsListContainer');
      container.innerHTML = '';

      cartoes.forEach(c => {
        const item = document.createElement('div');
        item.className = `card-row-item ${c.id === cartaoSelecionadoId ? 'active' : ''}`;
        item.onclick = () => selectCartao(c.id);
        
        item.innerHTML = `
          <div class="card-row-left">
            <div class="card-circle" style="background-color: ${c.cor};"></div>
            <span class="card-name">${c.nome}</span>
          </div>
          <div class="radio-circle"></div>
        `;
        container.appendChild(item);
      });
      updateInspector();
    }

    function selectCartao(id) {
      cartaoSelecionadoId = id;
      renderCartoesList();
    }

    // Calcula divisão
    function calculateDivision() {
      const valorStr = document.getElementById('inputValor').value.replace('R$', '').replace(',', '.').trim();
      const valor = parseFloat(valorStr) || 0;
      const divisao = (valor / 3).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

      document.getElementById('divValueLuan').innerText = divisao;
      document.getElementById('divValueMaria').innerText = divisao;
      document.getElementById('divValueJoao').innerText = divisao;
    }

    // Abre o Sub-fluxo de Cadastro de Cartão (Zen Mode / Modo Foco)
    function openSubflowCard() {
      subflowAberto = true;

      // Oculta a view do wizard ativo
      document.getElementById(`viewStep${passo}`).style.display = 'none';
      
      // Oculta o header e o footer do wizard (Modo Foco)
      document.getElementById('wizardHeader').classList.add('hidden-focus');
      document.getElementById('wizardFooter').classList.add('hidden-focus');

      // Exibe a tela do sub-fluxo
      document.getElementById('subflowCard').classList.add('active');
      
      // Limpa formulário do sub-fluxo
      document.getElementById('subflowCardName').value = '';
      document.getElementById('subflowCardDay').value = 10;
      
      updateInspector();
    }

    // Fecha o sub-fluxo
    function closeSubflowCard() {
      subflowAberto = false;

      // Restaura a view do wizard ativa
      document.getElementById(`viewStep${passo}`).style.display = 'flex';
      
      // Restaura o header e o footer do wizard
      document.getElementById('wizardHeader').classList.remove('hidden-focus');
      document.getElementById('wizardFooter').classList.remove('hidden-focus');

      // Esconde a tela do sub-fluxo
      document.getElementById('subflowCard').classList.remove('active');
      
      updateInspector();
    }

    // Salva o cartão no sub-fluxo e retorna ao ponto anterior com ele selecionado
    function saveCardSubflow() {
      const nomeVal = document.getElementById('subflowCardName').value.trim();
      const diaVal = parseInt(document.getElementById('subflowCardDay').value) || 10;

      if (!nomeVal) {
        alert("Por favor, digite o nome do cartão.");
        return;
      }

      const novoId = Date.now().toString();
      const novoCartao = {
        id: novoId,
        nome: nomeVal,
        cor: selectedColor,
        diaFechamento: diaVal
      };

      cartoes.push(novoCartao);
      cartaoSelecionadoId = novoId; // Seleciona automaticamente o cartão criado!

      renderCartoesList();
      closeSubflowCard();
    }

    // Seletor de cor no subflow
    function selectColor(el) {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      el.classList.add('selected');
      selectedColor = el.getAttribute('data-color');
    }

    // Atualiza o inspetor de estado lateral (imita o Vue)
    function updateInspector() {
      document.getElementById('inspectPasso').innerText = `Passo ${passo} / 3`;
      
      const desc = document.getElementById('inputDesc').value;
      document.getElementById('inspectDesc').innerText = desc ? desc : '-';
      
      const valor = document.getElementById('inputValor').value;
      document.getElementById('inspectValor').innerText = valor ? valor : '-';
      
      document.getElementById('inspectComprador').innerText = comprador;
      
      if (metodo === 'pix') {
        document.getElementById('inspectCartao').innerText = 'N/A (Pagamento em Pix)';
      } else {
        const c = cartoes.find(x => x.id === cartaoSelecionadoId);
        document.getElementById('inspectCartao').innerText = c ? `${c.nome} (${c.cor})` : 'Nenhum';
      }

      document.getElementById('inspectSubflow').innerText = subflowAberto ? 'Sim (Modo Foco)' : 'Não';
      document.getElementById('inspectSubflow').style.color = subflowAberto ? '#ef4444' : '#10b981';
    }

    function resetWizard() {
      passo = 1;
      comprador = 'Luan';
      metodo = 'pix';
      cartaoSelecionadoId = '1';
      document.getElementById('inputDesc').value = '';
      document.getElementById('inputValor').value = '';
      
      // Volta para Luan ativo
      document.querySelectorAll('.buyer-option').forEach(o => o.classList.remove('active'));
      document.querySelector('.buyer-option').classList.add('active');

      setMethod('pix');
      navigateStep(0); // Força atualização de view
    }

    window.onload = init;
  </script>
</body>
</html>
